name: Trigger docs sync on merged PR

on:
  pull_request:
    types: [closed]

jobs:
  dispatch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        uses: tibdex/github-app-token@v2
        id: app-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Extract scenario from changed files
        id: scenario
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SCENARIO=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --jq '.[].filename | split("/")[0]' | sort -u | grep -v '^\.' | head -1)
          echo "name=$SCENARIO" >> $GITHUB_OUTPUT

      - name: Send docs dispatch to website
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/StrikerEureka34/website_2/dispatches \
            -d "{
              \"event_type\": \"upstream_docs_change\",
              \"client_payload\": {
                \"scenario\": \"${{ steps.scenario.outputs.name }}\",
                \"pr_number\": ${{ github.event.pull_request.number }},
                \"pr_title\": \"${{ github.event.pull_request.title }}\"
              }
            }"
